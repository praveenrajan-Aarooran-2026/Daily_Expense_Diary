<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b3d2e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Expense Diary" />
<title>Daily Expense Diary Tracker</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Daily%20Expense%20Diary%20Tracker%22%2C%22short_name%22%3A%22Expense%20Diary%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23faf8f3%22%2C%22theme_color%22%3A%22%230b3d2e%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%5D%7D" />
<style>
  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --ink: #15241c;
    --ink-soft: #5a6b62;
    --ink-faint: #9aa89f;
    --line: #e6e3da;
    --green: #0b3d2e;
    --green-soft: #e4f0e9;
    --green-text: #126b4a;
    --red: #b23a30;
    --red-soft: #fbeae8;
    --accent: #e8a33d;
    --upi: #6a5acd;
    --cash: #2e8b57;
    --card: #2f6fb3;
    --bank: #c08229;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 2px rgba(21,36,28,0.04), 0 8px 24px rgba(21,36,28,0.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .app { max-width: 540px; margin: 0 auto; padding: 0 16px 120px; }

  header {
    padding: calc(env(safe-area-inset-top) + 24px) 0 8px;
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .lang-btn {
    border: 1.5px solid var(--line); background: var(--surface); color: var(--green);
    border-radius: 30px; padding: 7px 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; flex-shrink: 0; margin-top: 4px;
  }
  .lang-btn:active { background: var(--bg); }
  .sync-badge { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 30px; }
  .sync-badge:empty { display: none; }
  .sync-badge.ok { background: var(--green-soft); color: var(--green-text); }
  .sync-badge.wait { background: #fff3d6; color: #9a6b00; }
  .sync-badge.err { background: var(--red-soft); color: var(--red); }
  .sync-badge.off { background: #eceae3; color: var(--ink-faint); }
  .header-btns { display: flex; gap: 8px; align-items: flex-start; }
  .signout-btn { color: var(--red) !important; }
  .login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-box { width: 100%; max-width: 360px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 24px; }
  .login-sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 20px; }
  .login-box input { width: 100%; border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 13px; font-size: 16px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: var(--green); }
  .login-btn { width: 100%; border: none; background: var(--green); color: #fff; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .login-btn:active { opacity: 0.9; }
  .login-err { color: var(--red); font-size: 13px; font-weight: 600; min-height: 18px; margin-bottom: 6px; }
  .login-hint { text-align: center; font-size: 12px; color: var(--ink-faint); margin-top: 14px; }
  .login-ok { color: var(--green-text); font-size: 13px; font-weight: 600; min-height: 0; margin-bottom: 6px; }
  .login-toggle { text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 16px; }
  .login-toggle a { color: var(--green-text); font-weight: 700; text-decoration: none; margin-left: 5px; }
  .login-toggle a:hover { text-decoration: underline; }
  .brand { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; color: var(--green); }
  .brand span { color: var(--accent); }
  .tagline { font-size: 12px; color: var(--ink-faint); font-weight: 500; }

  .balance-card {
    background: var(--green);
    color: #eef6f1;
    border-radius: var(--radius);
    padding: 22px 22px 20px;
    margin-top: 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .balance-card .lbl { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; font-weight: 600; }
  .balance-card .amt { font-size: 38px; font-weight: 800; letter-spacing: -0.03em; margin: 4px 0 16px; }
  .balance-split { display: flex; gap: 10px; }
  .balance-split .b { flex: 1; background: rgba(255,255,255,0.08); border-radius: var(--radius-sm); padding: 11px 13px; }
  .balance-split .b .k { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .balance-split .b .v { font-size: 19px; font-weight: 800; margin-top: 3px; }
  .balance-flow { display: flex; gap: 18px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.12); }
  .balance-flow .f { font-size: 13px; opacity: 0.85; font-weight: 500; }
  .balance-flow .f b { font-weight: 800; }
  .balance-flow .f.in b { color: #8fe3bd; }
  .balance-flow .f.out b { color: #f3b0a8; }

  .add-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-top: 16px;
  }
  .seg { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; gap: 4px; margin-bottom: 14px; }
  .seg button {
    flex: 1; border: none; background: transparent; padding: 10px; border-radius: 8px;
    font-size: 14px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: all 0.15s;
  }
  .seg button.active.out { background: var(--red-soft); color: var(--red); }
  .seg button.active.in { background: var(--green-soft); color: var(--green-text); }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  input, select {
    width: 100%; border: 1.5px solid var(--line); background: var(--surface);
    border-radius: var(--radius-sm); padding: 12px 13px; font-size: 16px; color: var(--ink);
    font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--green); }
  .amount-input { position: relative; }
  .amount-input span { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-size: 16px; font-weight: 600; }
  .amount-input input { padding-left: 28px; font-weight: 700; }

  .methods { display: flex; gap: 8px; flex-wrap: wrap; }
  .methods .m {
    flex: 1; min-width: 64px; text-align: center; padding: 10px 4px; border: 1.5px solid var(--line);
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; transition: all 0.15s;
  }
  .methods .m.active { border-color: currentColor; }
  .methods .m[data-m="UPI"].active { color: var(--upi); background: #efedfb; }
  .methods .m[data-m="Cash"].active { color: var(--cash); background: #e7f3ec; }
  .methods .m[data-m="Card"].active { color: var(--card); background: #e9f1f9; }
  .methods .m[data-m="Bank"].active { color: var(--bank); background: #f8efde; }

  .submit {
    width: 100%; border: none; border-radius: var(--radius-sm); padding: 15px;
    font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; margin-top: 14px; transition: transform 0.1s, opacity 0.15s;
  }
  .submit.out { background: var(--red); }
  .submit.in { background: var(--green-text); }
  .submit:active { transform: scale(0.985); }

  .list-head { display: flex; align-items: center; justify-content: space-between; margin: 26px 2px 12px; }
  .list-head h2 { font-size: 16px; font-weight: 700; margin: 0; }
  .filters { display: flex; gap: 8px; margin-bottom: 8px; }
  .filters input[type="text"] { flex: 1; padding: 10px 12px; font-size: 14px; }
  .filters input[type="number"] { flex: 1; padding: 10px 12px; font-size: 14px; }
  .filters select { flex: 1; padding: 10px 12px; font-size: 14px; }
  .datewrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .datewrap label { font-size: 11px; font-weight: 600; color: var(--ink-faint); padding-left: 2px; }
  .datewrap input { padding: 10px 12px; font-size: 14px; }
  .filter-bar { display: none; align-items: center; justify-content: space-between; margin: 4px 2px 12px; }
  .filter-bar.show { display: flex; }
  .filter-bar #filterCount { font-size: 12px; font-weight: 600; color: var(--ink-soft); }
  .filter-bar button { border: none; background: transparent; color: var(--red); font-size: 13px; font-weight: 700; cursor: pointer; padding: 4px 0; }
  .summary { display: none; gap: 18px; background: var(--surface); border-radius: var(--radius-sm); padding: 13px 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .summary.show { display: flex; }
  .summary .s { flex: 1; }
  .summary .s .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; color: var(--ink-faint); }
  .summary .s .v { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .summary .s.in .v { color: var(--green-text); }
  .summary .s.out .v { color: var(--red); }

  .day-group { margin-bottom: 18px; }
  .day-label { font-size: 12px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 2px 8px; display: flex; justify-content: space-between; }
  .day-label .day-net { font-weight: 700; }

  .item {
    display: flex; align-items: center; gap: 12px; background: var(--surface);
    border-radius: var(--radius-sm); padding: 13px 14px; margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .item .dot { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; }
  .dot.UPI { background: #efedfb; color: var(--upi); }
  .dot.Cash { background: #e7f3ec; color: var(--cash); }
  .dot.Card { background: #e9f1f9; color: var(--card); }
  .dot.Bank { background: #f8efde; color: var(--bank); }
  .item .meta { flex: 1; min-width: 0; }
  .item .desc { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .sub { font-size: 12px; color: var(--ink-faint); }
  .item .amt { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .item .amt.in { color: var(--green-text); }
  .item .amt.out { color: var(--red); }
  .item .del { border: none; background: transparent; color: var(--ink-faint); font-size: 18px; cursor: pointer; padding: 4px 0 4px 6px; line-height: 1; }
  .item .del:active { color: var(--red); }

  .empty { text-align: center; padding: 40px 20px; color: var(--ink-faint); }
  .empty .big { font-size: 40px; margin-bottom: 8px; }
  .empty p { font-size: 14px; margin: 4px 0 0; }

  .toolbar { display: flex; gap: 8px; margin-top: 8px; }
  .toolbar button {
    flex: 1; border: 1.5px solid var(--line); background: var(--surface); border-radius: var(--radius-sm);
    padding: 11px; font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer;
  }
  .toolbar button:active { background: var(--bg); }

  .credit { text-align: center; font-size: 12px; color: var(--ink-faint); font-weight: 500; padding: 24px 0 8px; letter-spacing: 0.02em; }
  .toast { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 30px; font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .excel-btn { width: 100%; background: var(--green) !important; color: #fff !important; border-color: var(--green) !important; font-size: 14px !important; padding: 13px !important; }
  .excel-btn:active { opacity: 0.9; }
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <div class="brand" style="font-size:24px;margin-bottom:2px;">Daily Expense Diary<span>.</span></div>
    <div class="login-sub" id="loginSub" data-i18n="loginSub">Sign in to your book</div>
    <input type="email" id="loginEmail" data-i18n-ph="emailPh" placeholder="Email" autocomplete="username" />
    <input type="password" id="loginPass" data-i18n-ph="passPh" placeholder="Password" autocomplete="current-password" />
    <div class="login-err" id="loginErr"></div>
    <div class="login-ok" id="loginOk"></div>
    <button class="login-btn" id="loginBtn" onclick="submitAuth()" data-i18n="signIn">Sign in</button>
    <div class="login-toggle">
      <span id="toggleText" data-i18n="noAccount">No account yet?</span>
      <a href="#" id="toggleLink" onclick="toggleAuthMode(event)" data-i18n="createOne">Create one</a>
    </div>
  </div>
</div>
<div class="app">
  <header>
    <div>
      <div class="brand">Daily Expense Diary<span>.</span></div>
      <div class="tagline" data-i18n="tagline">daily money tracker</div>
      <div class="sync-badge off" id="syncBadge"></div>
    </div>
    <div class="header-btns">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">தமிழ்</button>
      <button class="lang-btn signout-btn" id="signoutBtn" onclick="doLogout()" style="display:none" data-i18n="signOut">Sign out</button>
    </div>
  </header>

  <div class="balance-card">
    <div class="lbl" data-i18n="netBalance">Net balance</div>
    <div class="amt" id="balance">₹0</div>
    <div class="balance-split">
      <div class="b cash"><div class="k"><span data-i18n="cashInHand">Cash in hand</span></div><div class="v" id="balCash">₹0</div></div>
      <div class="b bankdig"><div class="k"><span data-i18n="bankDigital">Bank / Digital</span></div><div class="v" id="balBank">₹0</div></div>
    </div>
    <div class="balance-flow">
      <div class="f in"><span data-i18n="received">↓ Received</span> <b id="totalIn">₹0</b></div>
      <div class="f out"><span data-i18n="spent">↑ Spent</span> <b id="totalOut">₹0</b></div>
    </div>
  </div>

  <div class="add-card">
    <div class="seg">
      <button id="segOut" class="active out" onclick="setType('out')" data-i18n="spent">↑ Spent</button>
      <button id="segIn" class="in" onclick="setType('in')" data-i18n="received">↓ Received</button>
    </div>
    <div class="grid2">
      <div class="field">
        <label data-i18n="amount">Amount</label>
        <div class="amount-input"><span>₹</span><input type="number" id="amt" inputmode="decimal" placeholder="0" min="0" step="1" /></div>
      </div>
      <div class="field">
        <label data-i18n="date">Date</label>
        <input type="date" id="date" />
      </div>
    </div>
    <div class="field">
      <label data-i18n="whatFor">What for / who</label>
      <input type="text" id="desc" data-i18n-ph="descPh" placeholder="e.g. Groceries, Rahul paid back" />
    </div>
    <div class="field">
      <label data-i18n="method">Method</label>
      <div class="methods" id="methods">
        <div class="m active" data-m="UPI" onclick="setMethod('UPI')">UPI</div>
        <div class="m" data-m="Cash" onclick="setMethod('Cash')">Cash</div>
        <div class="m" data-m="Card" onclick="setMethod('Card')">Card</div>
        <div class="m" data-m="Bank" onclick="setMethod('Bank')">Bank</div>
      </div>
    </div>
    <button class="submit out" id="submitBtn" onclick="addEntry()" data-i18n="addTxn">Add transaction</button>
  </div>

  <div class="list-head">
    <h2 data-i18n="history">History</h2>
  </div>
  <div class="filters">
    <input type="text" id="search" data-i18n-ph="searchPh" placeholder="Search…" oninput="render()" />
    <select id="fmethod" onchange="render()">
      <option value="" data-i18n="allMethods">All methods</option>
      <option value="UPI">UPI</option>
      <option value="Cash" data-i18n="cash">Cash</option>
      <option value="Card" data-i18n="card">Card</option>
      <option value="Bank" data-i18n="bank">Bank</option>
    </select>
  </div>
  <div class="filters">
    <select id="ftype" onchange="render()">
      <option value="" data-i18n="inAndOut">In &amp; out</option>
      <option value="in" data-i18n="receivedOnly">Received only</option>
      <option value="out" data-i18n="spentOnly">Spent only</option>
    </select>
    <input type="number" id="fmin" inputmode="decimal" data-i18n-ph="minPh" placeholder="Min ₹" min="0" oninput="render()" />
    <input type="number" id="fmax" inputmode="decimal" data-i18n-ph="maxPh" placeholder="Max ₹" min="0" oninput="render()" />
  </div>
  <div class="filters">
    <div class="datewrap"><label data-i18n="from">From</label><input type="date" id="ffrom" onchange="render()" /></div>
    <div class="datewrap"><label data-i18n="to">To</label><input type="date" id="fto" onchange="render()" /></div>
  </div>
  <div class="filter-bar" id="filterBar">
    <span id="filterCount"></span>
    <button id="clearFilters" onclick="clearFilters()" data-i18n="clearFilters">Clear filters</button>
  </div>
  <div class="summary" id="summary"></div>
  <div id="list"></div>

  <div class="toolbar">
    <button class="excel-btn" onclick="exportExcel()" data-i18n="exportExcel">⬇ Download as Excel</button>
  </div>
  <div class="toolbar">
    <button onclick="exportData()" data-i18n="exportBackup">Export backup</button>
    <button onclick="document.getElementById('importFile').click()" data-i18n="importBackup">Import backup</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)" />
  </div>

  <footer class="credit">Created by Praveen Sundararajan</footer>
</div>

<div class="toast" id="toast"></div>

  function t(key) { return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key; }

  function applyLang() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      el.innerHTML = t(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(function (el) {
      el.placeholder = t(el.getAttribute('data-i18n-ph'));
    });
    document.getElementById('langBtn').textContent = t('langLabel');
    setSyncBadge(curSyncState);
    render();
  }

  function toggleLang() {
    lang = (lang === 'en') ? 'ta' : 'en';
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
    applyLang();
  }

  function saveLocal() {
    try { localStorage.setItem(KEY, JSON.stringify(entries)); } catch (e) {}
  }
  function loadLocal() {
    try { entries = JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { entries = []; }
  }

  // Initialise cloud sync if configured. Falls back to local-only otherwise.
  function initSync() {
    var configured = SUPABASE_URL.indexOf('PASTE_') < 0 && SUPABASE_KEY.indexOf('PASTE_') < 0 &&
      SUPABASE_URL && SUPABASE_KEY && typeof supabase !== 'undefined';
    if (!configured) { setSyncBadge('offline'); return; }
    try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) { sb = null; setSyncBadge('offline'); return; }
    // Check if already signed in (session persists across visits)
    sb.auth.getSession().then(function (res) {
      if (res.data && res.data.session) { onSignedIn(res.data.session); }
      else { showLogin(); }
    });
    // React to future auth changes
    sb.auth.onAuthStateChange(function (event, session) {
      if (session) { onSignedIn(session); } else { showLogin(); }
    });
  }

  function showLogin() {
    syncOn = false;
    currentUser = null;
    setSyncBadge('offline');
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('signoutBtn').style.display = 'none';
  }

  function onSignedIn(session) {
    currentUser = session && session.user ? session.user.id : null;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('signoutBtn').style.display = '';
    document.getElementById('loginErr').textContent = '';
    document.getElementById('loginOk').textContent = '';
    document.getElementById('loginPass').value = '';
    syncOn = true;
    setSyncBadge('connecting');
    cloudLoad();
    if (!window._sub) {
      window._sub = sb.channel('entries-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'entries' }, function () { cloudLoad(); })
        .subscribe();
    }
  }

  function toggleAuthMode(e) {
    if (e) e.preventDefault();
    authMode = (authMode === 'login') ? 'signup' : 'login';
    document.getElementById('loginErr').textContent = '';
    document.getElementById('loginOk').textContent = '';
    var btn = document.getElementById('loginBtn');
    if (authMode === 'signup') {
      document.getElementById('loginSub').textContent = t('signupSub');
      btn.textContent = t('createAccount');
      document.getElementById('toggleText').textContent = t('haveAccount');
      document.getElementById('toggleLink').textContent = t('signInLink');
      document.getElementById('loginPass').setAttribute('autocomplete', 'new-password');
    } else {
      document.getElementById('loginSub').textContent = t('loginSub');
      btn.textContent = t('signIn');
      document.getElementById('toggleText').textContent = t('noAccount');
      document.getElementById('toggleLink').textContent = t('createOne');
      document.getElementById('loginPass').setAttribute('autocomplete', 'current-password');
    }
  }

  function submitAuth() {
    if (authMode === 'signup') { doSignup(); } else { doLogin(); }
  }

  function doLogin() {
    if (!sb) return;
    var email = document.getElementById('loginEmail').value.trim();
    var pass = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginErr');
    var okEl = document.getElementById('loginOk');
    errEl.textContent = ''; okEl.textContent = '';
    if (!email || !pass) { errEl.textContent = t('loginNeed'); return; }
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = t('signingIn');
    sb.auth.signInWithPassword({ email: email, password: pass }).then(function (res) {
      btn.disabled = false; btn.textContent = t('signIn');
      if (res.error) {
        // a common cause is unconfirmed email
        if (/confirm/i.test(res.error.message || '')) { errEl.textContent = t('confirmFirst'); }
        else { errEl.textContent = t('loginFail'); }
      }
    });
  }

  function doSignup() {
    if (!sb) return;
    var email = document.getElementById('loginEmail').value.trim();
    var pass = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginErr');
    var okEl = document.getElementById('loginOk');
    errEl.textContent = ''; okEl.textContent = '';
    if (!email || !pass) { errEl.textContent = t('loginNeed'); return; }
    if (pass.length < 6) { errEl.textContent = t('passShort'); return; }
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = t('creating');
    sb.auth.signUp({ email: email, password: pass }).then(function (res) {
      btn.disabled = false; btn.textContent = t('createAccount');
      if (res.error) {
        if (/already|registered|exists/i.test(res.error.message || '')) { errEl.textContent = t('emailTaken'); }
        else { errEl.textContent = (res.error.message || t('loginFail')); }
        return;
      }
      // With email confirmation ON, no session is returned yet.
      if (res.data && res.data.session) {
        // (confirmation off) signed in immediately
      } else {
        okEl.textContent = t('checkEmail');
        toggleAuthMode(); // flip back to login view so they sign in after confirming
        document.getElementById('loginOk').textContent = t('checkEmail');
      }
    });
  }

  function doLogout() {
    if (!sb) return;
    sb.auth.signOut().then(function () {
      entries = []; saveLocal(); render();
      showLogin();
    });
  }

  function cloudLoad() {
    if (!syncOn) return;
    sb.from('entries').select('*').order('date', { ascending: false }).then(function (res) {
      if (res.error) { setSyncBadge('error'); return; }
      entries = (res.data || []).map(function (r) {
        return { id: String(r.id), type: r.type, amount: Number(r.amount), desc: r.desc, date: r.date, method: r.method };
      });
      saveLocal();
      setSyncBadge('synced');
      render();
    });
  }

  function setSyncBadge(state) {
    curSyncState = state;
    var el = document.getElementById('syncBadge');
    if (!el) return;
    var map = {
      synced:    { txt: t('syncSynced'),  cls: 'ok' },
      connecting:{ txt: t('syncConnecting'), cls: 'wait' },
      error:     { txt: t('syncError'),   cls: 'err' },
      offline:   { txt: t('syncOffline'), cls: 'off' }
    };
    var s = map[state] || map.offline;
    el.textContent = s.txt;
    el.className = 'sync-badge ' + s.cls;
  }

  function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

  function setType(t) {
    curType = t;
    document.getElementById('segOut').classList.toggle('active', t === 'out');
    document.getElementById('segIn').classList.toggle('active', t === 'in');
    var btn = document.getElementById('submitBtn');
    btn.classList.toggle('out', t === 'out');
    btn.classList.toggle('in', t === 'in');
  }
  function setMethod(m) {
    curMethod = m;
    document.querySelectorAll('.methods .m').forEach(function (el) {
      el.classList.toggle('active', el.dataset.m === m);
    });
  }

  function addEntry() {
    var amt = parseFloat(document.getElementById('amt').value);
    if (!amt || amt <= 0) { document.getElementById('amt').focus(); toast(t('enterAmount')); return; }
    var desc = document.getElementById('desc').value.trim();
    var date = document.getElementById('date').value || new Date().toISOString().slice(0, 10);
    var rec = {
      id: Date.now() + '' + Math.floor(Math.random() * 1000),
      type: curType, amount: amt,
      desc: desc || (curType === 'in' ? 'Received' : 'Spent'),
      date: date, method: curMethod
    };
    document.getElementById('amt').value = '';
    document.getElementById('desc').value = '';

    if (syncOn) {
      // optimistic: show immediately, then write to cloud
      entries.unshift(rec); saveLocal(); render();
      var cloudRec = { id: rec.id, type: rec.type, amount: rec.amount, desc: rec.desc, date: rec.date, method: rec.method, user_id: currentUser };
      sb.from('entries').insert([cloudRec]).then(function (res) {
        if (res.error) { toast(t('syncError')); }
        else { toast(curType === 'in' ? t('incomeAdded') : t('expenseAdded')); cloudLoad(); }
      });
    } else {
      entries.unshift(rec); saveLocal(); render();
      toast(curType === 'in' ? t('incomeAdded') : t('expenseAdded'));
    }
  }

  function delEntry(id) {
    if (syncOn) {
      entries = entries.filter(function (e) { return e.id !== id; }); saveLocal(); render();
      sb.from('entries').delete().eq('id', id).then(function (res) {
        if (res.error) { toast(t('syncError')); cloudLoad(); }
        else { toast(t('deleted')); }
      });
    } else {
      entries = entries.filter(function (e) { return e.id !== id; });
      saveLocal(); render();
      toast(t('deleted'));
    }
  }

  function dayHeading(dateStr) {
    var today = new Date(); today.setHours(0,0,0,0);
    var d = new Date(dateStr + 'T00:00');
    var diff = Math.round((today - d) / 86400000);
    if (diff === 0) return t('today');
    if (diff === 1) return t('yesterday');
    return d.toLocaleDateString(lang === 'ta' ? 'ta-IN' : 'en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function clearFilters() {
    document.getElementById('search').value = '';
    document.getElementById('fmethod').value = '';
    document.getElementById('ftype').value = '';
    document.getElementById('fmin').value = '';
    document.getElementById('fmax').value = '';
    document.getElementById('ffrom').value = '';
    document.getElementById('fto').value = '';
    render();
  }

  function render() {
    var totalIn = 0, totalOut = 0, cashBal = 0, bankBal = 0;
    entries.forEach(function (e) {
      var signed = (e.type === 'in' ? 1 : -1) * e.amount;
      if (e.type === 'in') totalIn += e.amount; else totalOut += e.amount;
      if (e.method === 'Cash') cashBal += signed; else bankBal += signed;
    });
    document.getElementById('totalIn').textContent = fmt(totalIn);
    document.getElementById('totalOut').textContent = fmt(totalOut);
    document.getElementById('balance').textContent = fmt(totalIn - totalOut);
    document.getElementById('balCash').textContent = fmt(cashBal);
    document.getElementById('balBank').textContent = fmt(bankBal);

    var q = document.getElementById('search').value.toLowerCase();
    var fm = document.getElementById('fmethod').value;
    var ft = document.getElementById('ftype').value;
    var fmin = parseFloat(document.getElementById('fmin').value);
    var fmax = parseFloat(document.getElementById('fmax').value);
    var ffrom = document.getElementById('ffrom').value;
    var fto = document.getElementById('fto').value;

    var anyFilter = q || fm || ft || !isNaN(fmin) || !isNaN(fmax) || ffrom || fto;

    var filtered = entries.filter(function (e) {
      if (q && e.desc.toLowerCase().indexOf(q) < 0) return false;
      if (fm && e.method !== fm) return false;
      if (ft && e.type !== ft) return false;
      if (!isNaN(fmin) && e.amount < fmin) return false;
      if (!isNaN(fmax) && e.amount > fmax) return false;
      if (ffrom && e.date < ffrom) return false;
      if (fto && e.date > fto) return false;
      return true;
    });

    var bar = document.getElementById('filterBar');
    var summary = document.getElementById('summary');
    if (anyFilter) {
      var fin = 0, fout = 0;
      filtered.forEach(function (e) { if (e.type === 'in') fin += e.amount; else fout += e.amount; });
      bar.classList.add('show');
      document.getElementById('filterCount').textContent = filtered.length + (filtered.length === 1 ? t('match') : t('matches'));
      summary.classList.add('show');
      summary.innerHTML =
        '<div class="s in"><div class="k">' + t('receivedShort') + '</div><div class="v">' + fmt(fin) + '</div></div>' +
        '<div class="s out"><div class="k">' + t('spentShort') + '</div><div class="v">' + fmt(fout) + '</div></div>' +
        '<div class="s"><div class="k">' + t('net') + '</div><div class="v">' + (fin - fout >= 0 ? '+' : '−') + fmt(Math.abs(fin - fout)) + '</div></div>';
    } else {
      bar.classList.remove('show');
      summary.classList.remove('show');
    }

    var list = document.getElementById('list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="big">🪙</div><p>' +
        (entries.length === 0 ? t('noTxn') : t('noMatch')) + '</p></div>';
      return;
    }

    var groups = {};
    filtered.forEach(function (e) { (groups[e.date] = groups[e.date] || []).push(e); });
    var dates = Object.keys(groups).sort().reverse();

    var html = '';
    dates.forEach(function (date) {
      var items = groups[date];
      var net = items.reduce(function (s, e) { return s + (e.type === 'in' ? e.amount : -e.amount); }, 0);
      var netColor = net >= 0 ? 'var(--green-text)' : 'var(--red)';
      html += '<div class="day-group"><div class="day-label"><span>' + dayHeading(date) +
        '</span><span class="day-net" style="color:' + netColor + '">' + (net >= 0 ? '+' : '−') + fmt(Math.abs(net)) + '</span></div>';
      items.forEach(function (e) {
        var safeDesc = e.desc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html += '<div class="item">' +
          '<div class="dot ' + e.method + '">' + e.method.charAt(0) + '</div>' +
          '<div class="meta"><div class="desc">' + safeDesc + '</div><div class="sub">' + e.method + '</div></div>' +
          '<div class="amt ' + e.type + '">' + (e.type === 'in' ? '+' : '−') + fmt(e.amount) + '</div>' +
          '<button class="del" onclick="delEntry(\'' + e.id + '\')" aria-label="Delete">×</button>' +
        '</div>';
      });
      html += '</div>';
    });
    list.innerHTML = html;
  }

  var toastTimer;
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 1800);
  }

  function exportData() {
    var blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'expense-diary-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast(t('backupDownloaded'));
  }

  function exportExcel() {
    if (entries.length === 0) { toast(t('noTxn').replace(/<br>.*/, '')); return; }
    var rows = entries.slice().sort(function (a, b) {
      return (a.date || '').localeCompare(b.date || '') || String(a.id).localeCompare(String(b.id));
    });
    var headers = [t('colDate'), t('colType'), t('colAmount'), t('colMethod'), t('colDesc')];
    var totalIn = 0, totalOut = 0;
    var data = rows.map(function (e) {
      if (e.type === 'in') totalIn += e.amount; else totalOut += e.amount;
      return [
        e.date || '',
        e.type === 'in' ? t('received').replace(/[↓↑]\s*/, '') : t('spent').replace(/[↓↑]\s*/, ''),
        e.amount, e.method, e.desc
      ];
    });
    var aoa = [headers].concat(data);
    aoa.push(['']);
    aoa.push([t('received').replace(/[↓↑]\s*/, ''), '', totalIn]);
    aoa.push([t('spent').replace(/[↓↑]\s*/, ''), '', totalOut]);
    aoa.push([t('net'), '', totalIn - totalOut]);
    var fname = 'expense-diary-' + new Date().toISOString().slice(0, 10) + '.xlsx';
    try {
      var blob = buildXlsx(aoa);
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = fname; a.click();
      URL.revokeObjectURL(url);
      toast(t('excelDownloaded'));
    } catch (err) {
      toast(t('badFile'));
    }
  }

  // ---- Minimal self-contained .xlsx writer (no external library) ----
  function buildXlsx(aoa) {
    var esc = function (s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
    };
    function colRef(c) { var s = ''; c++; while (c > 0) { var m = (c - 1) % 26; s = String.fromCharCode(65 + m) + s; c = Math.floor((c - 1) / 26); } return s; }
    var sheetRows = '';
    for (var r = 0; r < aoa.length; r++) {
      var cells = '';
      for (var c = 0; c < aoa[r].length; c++) {
        var v = aoa[r][c];
        if (v === '' || v === null || v === undefined) continue;
        var ref = colRef(c) + (r + 1);
        if (typeof v === 'number' && isFinite(v)) {
          cells += '<c r="' + ref + '"><v>' + v + '</v></c>';
        } else {
          cells += '<c r="' + ref + '" t="inlineStr"><is><t xml:space="preserve">' + esc(v) + '</t></is></c>';
        }
      }
      sheetRows += '<row r="' + (r + 1) + '">' + cells + '</row>';
    }
    var sheet = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
      '<cols><col min="1" max="1" width="12"/><col min="2" max="2" width="12"/><col min="3" max="3" width="12"/><col min="4" max="4" width="10"/><col min="5" max="5" width="32"/></cols>' +
      '<sheetData>' + sheetRows + '</sheetData></worksheet>';
    var contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
      '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
      '<Default Extension="xml" ContentType="application/xml"/>' +
      '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' +
      '<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>' +
      '</Types>';
    var rootRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
      '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>' +
      '</Relationships>';
    var workbook = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
      '<sheets><sheet name="Transactions" sheetId="1" r:id="rId1"/></sheets></workbook>';
    var wbRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
      '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>' +
      '</Relationships>';
    var files = [
      { name: '[Content_Types].xml', data: contentTypes },
      { name: '_rels/.rels', data: rootRels },
      { name: 'xl/workbook.xml', data: workbook },
      { name: 'xl/_rels/workbook.xml.rels', data: wbRels },
      { name: 'xl/worksheets/sheet1.xml', data: sheet }
    ];
    return zipFiles(files);
  }

  // ---- Minimal ZIP (store, no compression) with correct CRC32 ----
  function zipFiles(files) {
    var enc = function (str) {
      var utf8 = unescape(encodeURIComponent(str));
      var arr = new Uint8Array(utf8.length);
      for (var i = 0; i < utf8.length; i++) arr[i] = utf8.charCodeAt(i);
      return arr;
    };
    var crcTable = (function () {
      var tbl = [], c, n, k;
      for (n = 0; n < 256; n++) { c = n; for (k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); tbl[n] = c >>> 0; }
      return tbl;
    })();
    function crc32(bytes) {
      var c = 0xFFFFFFFF;
      for (var i = 0; i < bytes.length; i++) c = crcTable[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
      return (c ^ 0xFFFFFFFF) >>> 0;
    }
    var chunks = [], central = [], offset = 0;
    function u16(n) { return [n & 0xFF, (n >>> 8) & 0xFF]; }
    function u32(n) { return [n & 0xFF, (n >>> 8) & 0xFF, (n >>> 16) & 0xFF, (n >>> 24) & 0xFF]; }
    files.forEach(function (f) {
      var nameBytes = enc(f.name), dataBytes = enc(f.data), crc = crc32(dataBytes);
      var local = [].concat(u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0),
        u32(crc), u32(dataBytes.length), u32(dataBytes.length), u16(nameBytes.length), u16(0));
      chunks.push(new Uint8Array(local)); chunks.push(nameBytes); chunks.push(dataBytes);
      var localLen = local.length + nameBytes.length + dataBytes.length;
      var cen = [].concat(u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0),
        u32(crc), u32(dataBytes.length), u32(dataBytes.length), u16(nameBytes.length),
        u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset));
      central.push(new Uint8Array(cen)); central.push(nameBytes);
      offset += localLen;
    });
    var centralStart = offset, centralSize = 0;
    central.forEach(function (c) { centralSize += c.length; });
    var end = [].concat(u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length),
      u32(centralSize), u32(centralStart), u16(0));
    var all = chunks.concat(central).concat([new Uint8Array(end)]);
    return new Blob(all, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  }

  function importData(ev) {
    var file = ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error('bad format');
        var existing = {};
        entries.forEach(function (e) { existing[e.id] = true; });
        var toAdd = data.filter(function (e) { return e && e.id && !existing[e.id]; });
        toAdd.forEach(function (e) { entries.push(e); });
        entries.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
        saveLocal(); render();
        if (syncOn && toAdd.length) {
          var clean = toAdd.map(function (e) {
            return { id: String(e.id), type: e.type, amount: Number(e.amount), desc: e.desc, date: e.date, method: e.method, user_id: currentUser };
          });
          sb.from('entries').insert(clean).then(function (res) {
            if (res.error) { toast(t('syncError')); } else { toast(t('backupImported')); cloudLoad(); }
          });
        } else {
          toast(t('backupImported'));
        }
      } catch (e) { toast(t('badFile')); }
    };
    reader.readAsText(file);
    ev.target.value = '';
  }

  try { lang = localStorage.getItem(LANG_KEY) || 'en'; } catch (e) { lang = 'en'; }
  document.getElementById('date').value = new Date().toISOString().slice(0, 10);
  var passEl = document.getElementById('loginPass');
  if (passEl) passEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') submitAuth(); });
  loadLocal();
  applyLang();
  initSync();

</script>
</body>
</html>
